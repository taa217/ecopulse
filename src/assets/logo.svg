<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>

  <!-- People arranged in a circle -->
  <!-- Top - Blue -->
  <g transform="translate(100, 32)">
    <circle cx="0" cy="-8" r="9" fill="#2196F3"/>
    <path d="M-14,10 L-8,0 L0,6 L8,0 L14,10 L8,20 L-8,20 Z" fill="#2196F3"/>
  </g>

  <!-- Top-Right - Light Blue -->
  <g transform="translate(148, 52)">
    <circle cx="0" cy="-8" r="9" fill="#03A9F4"/>
    <path d="M-14,10 L-8,0 L0,6 L8,0 L14,10 L8,20 L-8,20 Z" fill="#03A9F4" transform="rotate(45)"/>
  </g>

  <!-- Right - Orange -->
  <g transform="translate(168, 100)">
    <circle cx="0" cy="-8" r="9" fill="#FF9800"/>
    <path d="M-14,10 L-8,0 L0,6 L8,0 L14,10 L8,20 L-8,20 Z" fill="#FF9800" transform="rotate(90)"/>
  </g>

  <!-- Bottom-Right - Deep Orange -->
  <g transform="translate(148, 148)">
    <circle cx="0" cy="-8" r="9" fill="#FF5722"/>
    <path d="M-14,10 L-8,0 L0,6 L8,0 L14,10 L8,20 L-8,20 Z" fill="#FF5722" transform="rotate(135)"/>
  </g>

  <!-- Bottom - Yellow -->
  <g transform="translate(100, 168)">
    <circle cx="0" cy="-8" r="9" fill="#FFC107"/>
    <path d="M-14,10 L-8,0 L0,6 L8,0 L14,10 L8,20 L-8,20 Z" fill="#FFC107" transform="rotate(180)"/>
  </g>

  <!-- Bottom-Left - Green -->
  <g transform="translate(52, 148)">
    <circle cx="0" cy="-8" r="9" fill="#4CAF50"/>
    <path d="M-14,10 L-8,0 L0,6 L8,0 L14,10 L8,20 L-8,20 Z" fill="#4CAF50" transform="rotate(225)"/>
  </g>

  <!-- Left - Purple -->
  <g transform="translate(32, 100)">
    <circle cx="0" cy="-8" r="9" fill="#9C27B0"/>
    <path d="M-14,10 L-8,0 L0,6 L8,0 L14,10 L8,20 L-8,20 Z" fill="#9C27B0" transform="rotate(270)"/>
  </g>

  <!-- Top-Left - Indigo -->
  <g transform="translate(52, 52)">
    <circle cx="0" cy="-8" r="9" fill="#3F51B5"/>
    <path d="M-14,10 L-8,0 L0,6 L8,0 L14,10 L8,20 L-8,20 Z" fill="#3F51B5" transform="rotate(315)"/>
  </g>

  <!-- Connecting arcs between people (subtle ring) -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="url(#leafGrad)" stroke-width="2" opacity="0.3"/>

  <!-- Center Leaf -->
  <g transform="translate(100, 100)">
    <!-- Leaf shape -->
    <path d="M0,28 C0,28 -8,10 -6,-8 C-4,-20 0,-30 0,-30 C0,-30 4,-20 6,-8 C8,10 0,28 0,28 Z" fill="url(#leafGrad)" opacity="0.95"/>
    <!-- Leaf vein -->
    <line x1="0" y1="-28" x2="0" y2="26" stroke="#1B5E20" stroke-width="1.2" opacity="0.5"/>
    <!-- Side veins -->
    <line x1="0" y1="-15" x2="-4" y2="-6" stroke="#1B5E20" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="-15" x2="4" y2="-6" stroke="#1B5E20" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="-5" x2="-4.5" y2="6" stroke="#1B5E20" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="-5" x2="4.5" y2="6" stroke="#1B5E20" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="5" x2="-3.5" y2="16" stroke="#1B5E20" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="5" x2="3.5" y2="16" stroke="#1B5E20" stroke-width="0.8" opacity="0.4"/>
    <!-- Stem -->
    <path d="M0,28 C2,32 3,36 2,40" fill="none" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
